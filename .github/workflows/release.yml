name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
          - os: macos-latest
            goos: darwin
            goarch: amd64
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o filerepo${EXT} ./cmd/filerepo

      - name: Package (unix)
        if: matrix.goos != 'windows'
        run: tar czf filerepo-${{ matrix.target }}.tar.gz filerepo

      - name: Package (windows)
        if: matrix.goos == 'windows'
        run: zip filerepo-${{ matrix.target }}.zip filerepo.exe

      - uses: actions/upload-artifact@v4
        with:
          name: filerepo-${{ matrix.target }}
          path: filerepo-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: filerepo-*

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
